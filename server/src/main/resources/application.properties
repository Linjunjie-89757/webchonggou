spring.application.name=auto-platform
server.port=8080
spring.jackson.time-zone=Asia/Shanghai
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/auto-platform;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.sql.init.mode=never
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.clean-disabled=true
mybatis-plus.configuration.map-underscore-to-camel-case=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=100MB
app.report.storage-root=${REPORT_STORAGE_ROOT:./data/report-files}
app.ai.secret=${AUTO_PLATFORM_AI_SECRET:auto-platform-ai-secret}
app.ai.request-timeout-seconds=${AUTO_PLATFORM_AI_TIMEOUT_SECONDS:60}
app.web.async-request-timeout-ms=${AUTO_PLATFORM_ASYNC_TIMEOUT_MS:1800000}
app.super-admin.username=${AUTO_PLATFORM_SUPER_ADMIN_USERNAME:superadmin}
app.super-admin.email=${AUTO_PLATFORM_SUPER_ADMIN_EMAIL:superadmin@local}
app.super-admin.display-name=${AUTO_PLATFORM_SUPER_ADMIN_DISPLAY_NAME:\u8d85\u7ea7\u7ba1\u7406\u5458}
app.super-admin.password=${AUTO_PLATFORM_SUPER_ADMIN_PASSWORD:superadmin123}
